apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backend
  labels:
    grafana_dashboard: "1"
data:
  backend-dashboard.json: |
    {
      "title": "Todolist Backend",
      "tags": ["todolist"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Backend Status (Up/Down)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            { "expr": "up{job=\"todolist-backend\"}", "legendFormat": "{{pod}}" }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": { "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 1 }] }
            }
          }
        },
        {
          "id": 2,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "x": 6, "y": 0, "w": 18, "h": 8 },
          "targets": [
            { "expr": "sum(rate(http_requests_total{job=\"todolist-backend\"}[5m])) by (status)", "legendFormat": "status {{status}}" }
          ]
        },
        {
          "id": 3,
          "title": "5xx Error Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "sum(rate(http_requests_total{job=\"todolist-backend\",status=~\"5..\"}[5m]))", "legendFormat": "5xx errors/s" }
          ],
          "fieldConfig": { "defaults": { "color": { "fixedColor": "red", "mode": "fixed" } } }
        },
        {
          "id": 4,
          "title": "CPU Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(process_cpu_user_seconds_total{job=\"todolist-backend\"}[5m])", "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 5,
          "title": "Memory Usage (RSS)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            { "expr": "process_resident_memory_bytes{job=\"todolist-backend\"}", "legendFormat": "{{pod}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 6,
          "title": "Event Loop Lag",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            { "expr": "nodejs_eventloop_lag_seconds{job=\"todolist-backend\"}", "legendFormat": "{{pod}}" }
          ]
        }
      ]
    }