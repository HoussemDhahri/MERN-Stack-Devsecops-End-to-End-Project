apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default

  sources:
    # 📊 Prometheus stack (Helm)
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 58.0.0
      helm:
        valueFiles:
          - $values/Kubernetes-Manifests-file/monitoring/helm/values.yaml

    # 📁 Git repo reference
    - repoURL: https://github.com/HoussemDhahri/MERN-Stack-Devsecops-End-to-End-Project.git
      targetRevision: main
      ref: values

    # 🚨 Alertmanager
    - repoURL: https://github.com/HoussemDhahri/MERN-Stack-Devsecops-End-to-End-Project.git
      targetRevision: main
      path: Kubernetes-Manifests-file/monitoring/alertmanager

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true