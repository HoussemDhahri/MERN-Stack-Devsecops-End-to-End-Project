apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base/frontend
- ../../base/backend
- ../../base/database
- ../../base/mongo-express

namespace: todolist-staging

patches:
- path: ingress-patch.yaml
  target:
      kind: Ingress
      name: frontend-ingress

replicas:
- count: 1
  name: todolist-frontend
- count: 1
  name: todolist-backend
- count: 1
  name: todolist-database
- count: 1
  name: mongo-express

images:
- name: houssemdhahri93/todolist-backend
  newName: houssemdhahri93/todolist-backend
  newTag: v1.0.1
  
- name: houssemdhahri93/todolist-frontend
  newName: houssemdhahri93/todolist-frontend
  newTag: v1.0.0
